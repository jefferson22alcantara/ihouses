services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      FUNDA_CLIENT_URL: http://funda-client:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app

  # See services/funda-client/NOTICE.md: isolated on purpose (AGPL-3.0
  # dependency, kept out of the proprietary `web` image). Only used when
  # FUNDA_ENABLED=true in .env.
  funda-client:
    build: ./services/funda-client

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ihouses}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ihouses}
      POSTGRES_DB: ${POSTGRES_DB:-ihouses}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ihouses}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
